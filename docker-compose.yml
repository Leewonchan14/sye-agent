services:
  db:
    image: postgres:16-alpine
    container_name: sye-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sye
      POSTGRES_PASSWORD: sye_dev_pass
      POSTGRES_DB: sye
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
